name: Bug report
description: Report a reproducible WorkspaceKit problem
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Back up important workflows and user data before reproducing file-operation bugs.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened, and what did you expect?
      placeholder: Describe the user-visible problem and expected behavior.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Open...
        2. Click...
        3. Observe...
    validations:
      required: true
  - type: input
    id: workspacekit-version
    attributes:
      label: WorkspaceKit version or commit
    validations:
      required: true
  - type: input
    id: comfyui-version
    attributes:
      label: ComfyUI and frontend versions
    validations:
      required: true
  - type: dropdown
    id: nodes2
    attributes:
      label: Nodes 2.0
      options:
        - Enabled
        - Disabled
        - Unknown
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Operating system and browser
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Remove tokens, private workflow content, and unrelated local paths.
      render: shell
  - type: textarea
    id: extensions
    attributes:
      label: Other relevant extensions
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues.
          required: true
        - label: I removed private data and secrets.
          required: true
