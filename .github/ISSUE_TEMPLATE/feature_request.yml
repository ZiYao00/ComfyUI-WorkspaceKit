name: Feature request
description: Propose a focused WorkspaceKit improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: pain
    attributes:
      label: User problem
      description: Describe the current workflow and the friction before proposing UI or code.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Explain the behavior, entry point, and expected result.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: area
    attributes:
      label: Product area
      options:
        - Workflows
        - Nodes and favorites
        - Templates
        - Canvas groups
        - Workspace and panels
        - Data migration
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: References or mockups
      description: Add screenshots, recordings, or links when they clarify the interaction.
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and the roadmap.
          required: true
        - label: This request belongs in WorkspaceKit rather than WorkspaceKit Layout.
          required: true
